apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
    name: k8ace-matrix-nvidia
spec:
    entrypoint: main
    templates:
        - name: main
          dag:
            tasks:
                - name: base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                  template: base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                - name: app-image-nvidia-pytorch-2-5-1-pytorch-cuda
                  template: app-image-nvidia-pytorch-2-5-1-pytorch-cuda
                  dependencies:
                    - base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
        - name: base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
          container:
            image: kaniko:test
            command:
                - /kaniko/executor
            args:
                - --context=.
                - --dockerfile=dockerfiles/base_image/nvidia/cuda_base/cuda12.4-devel-ubuntu22.04/Dockerfile
                - --destination=k8ace/cuda_base-cuda12.4-devel-ubuntu22.04
                - --cache=true
                - --cache-repo=k8ace/cache/nvidia/base_image
                - --build-arg=BASE_IMAGE=nvidia/cuda:cuda12.4-devel-ubuntu22.04
            volumeMounts:
                - name: registry-config
                  mountPath: /kaniko/.docker
                  readOnly: true
        - name: app-image-nvidia-pytorch-2-5-1-pytorch-cuda
          container:
            image: kaniko:test
            command:
                - /kaniko/executor
            args:
                - --context=.
                - --dockerfile=dockerfiles/app_image/nvidia/pytorch/2.5.1/pytorch-cuda/Dockerfile
                - --destination=k8ace/pytorch2.5.1-nvidia-pytorch-cuda-dev
                - --cache=true
                - --cache-repo=k8ace/cache/nvidia/app_image
                - --build-arg=BASE_IMAGE=k8ace/cuda_base-cuda12.4-devel-ubuntu22.04
                - --build-arg=CUDA_VERSION=12.4
                - --build-arg=PYTORCH_VERSION=2.5.1
            volumeMounts:
                - name: registry-config
                  mountPath: /kaniko/.docker
                  readOnly: true
    volumes:
        - name: registry-config
          secret:
            secretName: regcred
            items:
                - key: .dockerconfigjson
                  path: config.json
