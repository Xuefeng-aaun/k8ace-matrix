apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
    name: k8ace-matrix-nvidia
spec:
    entrypoint: main
    templates:
        - name: main
          dag:
            tasks:
                - name: host-driver-nvidia-pytorch-2-5-1-pytorch-cuda
                  template: host-driver-nvidia-pytorch-2-5-1-pytorch-cuda
                - name: base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                  template: base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                  dependencies:
                    - host-driver-nvidia-pytorch-2-5-1-pytorch-cuda
                - name: base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                  template: base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                  dependencies:
                    - base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                - name: app-image-nvidia-pytorch-2-5-1-pytorch-cuda
                  template: app-image-nvidia-pytorch-2-5-1-pytorch-cuda
                  dependencies:
                    - base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                - name: app-test-nvidia-pytorch-2-5-1-pytorch-cuda
                  template: app-test-nvidia-pytorch-2-5-1-pytorch-cuda
                  dependencies:
                    - app-image-nvidia-pytorch-2-5-1-pytorch-cuda
        - name: host-driver-nvidia-pytorch-2-5-1-pytorch-cuda
          container:
            image: nvidia/cuda:cuda12.4-devel-ubuntu22.04
            command:
                - sh
                - -c
            args:
                - |+
                  echo '[host_driver] stage=host_driver task=host-driver-nvidia-pytorch-2-5-1-pytorch-cuda';
                  set -eu
                  TARGET_ACCELERATOR='cuda-124'
                  MIN_DRIVER='550.54.15'

                  echo "[host_driver] vendor=nvidia runtime=cuda target=${TARGET_ACCELERATOR}"

                  if [ -z "${TARGET_ACCELERATOR}" ] || [ -z "${MIN_DRIVER}" ]; then
                    echo "[host_driver] ERROR: cannot determine target CUDA accelerator or minimum driver"
                    echo "[host_driver] Please set application runtime/accelerator or base min_driver_linux"
                    exit 1
                  fi

                  if ! command -v nvidia-smi >/dev/null 2>&1; then
                    echo "[host_driver] ERROR: nvidia-smi not found; NVIDIA driver/device plugin is unavailable in this pod"
                    exit 1
                  fi

                  GPU_LIST="$(nvidia-smi -L || true)"
                  echo "${GPU_LIST}"
                  if [ -z "${GPU_LIST}" ] || ! echo "${GPU_LIST}" | grep -q '^GPU '; then
                    echo "[host_driver] ERROR: no NVIDIA GPU visible in this pod"
                    exit 1
                  fi

                  DRIVER_VERSION="$(nvidia-smi --query-gpu=driver_version --format=csv,noheader 2>/dev/null | head -n1 | tr -d '[:space:]')"
                  if [ -z "${DRIVER_VERSION}" ]; then
                    echo "[host_driver] ERROR: cannot read NVIDIA driver version"
                    exit 1
                  fi

                  version_ge() {
                    awk -v a="$1" -v b="$2" 'BEGIN {
                      n = split(a, A, ".");
                      m = split(b, B, ".");
                      max = n > m ? n : m;
                      for (i = 1; i <= max; i++) {
                        ai = A[i] + 0;
                        bi = B[i] + 0;
                        if (ai > bi) exit 0;
                        if (ai < bi) exit 1;
                      }
                      exit 0;
                    }'
                  }

                  echo "[host_driver] detected_driver=${DRIVER_VERSION} required_min_driver=${MIN_DRIVER}"

                  if ! version_ge "${DRIVER_VERSION}" "${MIN_DRIVER}"; then
                    echo "[host_driver] ERROR: driver ${DRIVER_VERSION} is too old for ${TARGET_ACCELERATOR}; later smoke tests would be meaningless"
                    exit 1
                  fi

                  echo "[host_driver] PASS: NVIDIA driver is compatible with ${TARGET_ACCELERATOR}"

            resources:
                limits:
                    nvidia.com/gpu: "1"
                requests:
                    nvidia.com/gpu: "1"
        - name: base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
          container:
            image: kaniko:test
            command:
                - /kaniko/executor
            args:
                - --context=s3://kaniko-contexts/testdata/context.tar.gz
                - --dockerfile=dockerfiles/base_image/nvidia/cuda_base/cuda12.4-devel-ubuntu22.04/Dockerfile
                - --destination=172.20.47.182:5000/k8ace/cuda_base-cuda12.4-devel-ubuntu22.04
                - --skip-push-permission-check
                - --insecure-registry=172.20.47.182:5000
                - --build-arg=BASE_IMAGE=nvidia/cuda:cuda12.4-devel-ubuntu22.04
            env:
                - name: AWS_REGION
                  value: us-east-1
                - name: S3_ENDPOINT
                  value: http://172.20.47.182:9000
                - name: S3_FORCE_PATH_STYLE
                  value: "true"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                        name: context-creds
                        key: accessKey
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                        name: context-creds
                        key: secretKey
            volumeMounts:
                - name: registry-config
                  mountPath: /kaniko/.docker
                  readOnly: true
        - name: base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
          container:
            image: 172.20.47.182:5000/k8ace/cuda_base-cuda12.4-devel-ubuntu22.04
            command:
                - sh
                - -c
            args:
                - |
                  echo '[base_test] task=base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04 image=172.20.47.182:5000/k8ace/cuda_base-cuda12.4-devel-ubuntu22.04';
                  echo '[base_test] running check 1';
                  (
                  set -eu
                  echo "[base_test] NVIDIA CUDA runtime smoke"
                  python3 --version
                  (pip --version || pip3 --version)
                  command -v nvidia-smi
                  nvidia-smi -L | grep -q '^GPU '
                  nvidia-smi --query-gpu=driver_version --format=csv,noheader | head -n1 | grep -Eq '^[0-9]+(\.[0-9]+)+'
                  ldconfig -p 2>/dev/null | grep -q 'libcuda.so.1' || test -e /usr/lib/x86_64-linux-gnu/libcuda.so.1 || test -e /usr/local/cuda/compat/libcuda.so.1
                  ldconfig -p 2>/dev/null | grep -Eq 'libcudart\.so|libcuda\.so' || find /usr /opt /workspace \( -name 'libcudart.so*' -o -name 'libcuda.so*' \) 2>/dev/null | head -n1 | grep -q .
                  echo "[base_test] PASS: base image can see NVIDIA CUDA runtime"

                  ) || { echo '[base_test] FAILED check 1'; exit 1; };
                  echo '[base_test] ALL PASSED';
            resources:
                limits:
                    nvidia.com/gpu: "1"
                requests:
                    nvidia.com/gpu: "1"
        - name: app-image-nvidia-pytorch-2-5-1-pytorch-cuda
          container:
            image: kaniko:test
            command:
                - /kaniko/executor
            args:
                - --context=s3://kaniko-contexts/testdata/context.tar.gz
                - --dockerfile=dockerfiles/app_image/nvidia/pytorch/2.5.1/pytorch-cuda/Dockerfile
                - --destination=172.20.47.182:5000/k8ace/pytorch2.5.1-nvidia-pytorch-cuda-dev
                - --skip-push-permission-check
                - --insecure-registry=172.20.47.182:5000
                - --build-arg=BASE_IMAGE=172.20.47.182:5000/k8ace/cuda_base-cuda12.4-devel-ubuntu22.04
                - --build-arg=CUDA_VERSION=12.4
                - --build-arg=PYTORCH_VERSION=2.5.1
            env:
                - name: AWS_REGION
                  value: us-east-1
                - name: S3_ENDPOINT
                  value: http://172.20.47.182:9000
                - name: S3_FORCE_PATH_STYLE
                  value: "true"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                        name: context-creds
                        key: accessKey
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                        name: context-creds
                        key: secretKey
            volumeMounts:
                - name: registry-config
                  mountPath: /kaniko/.docker
                  readOnly: true
        - name: app-test-nvidia-pytorch-2-5-1-pytorch-cuda
          container:
            image: 172.20.47.182:5000/k8ace/pytorch2.5.1-nvidia-pytorch-cuda-dev
            command:
                - sh
                - -c
            args:
                - |
                  echo '[app_test] task=app-test-nvidia-pytorch-2-5-1-pytorch-cuda image=172.20.47.182:5000/k8ace/pytorch2.5.1-nvidia-pytorch-cuda-dev';
                  echo '[app_test] running check 1';
                  (
                  if [ -f /opt/k8ace/hack/test/smoke.sh ]; then bash /opt/k8ace/hack/test/smoke.sh L2 pytorch nvidia; else python3 --version && (pip list --format=columns 2>/dev/null || pip3 list --format=columns 2>/dev/null || true); fi
                  ) || { echo '[app_test] FAILED check 1'; exit 1; };
                  echo '[app_test] ALL PASSED';
            resources:
                limits:
                    nvidia.com/gpu: "1"
                requests:
                    nvidia.com/gpu: "1"
    volumes:
        - name: registry-config
          secret:
            secretName: regcred
            items:
                - key: .dockerconfigjson
                  path: config.json
