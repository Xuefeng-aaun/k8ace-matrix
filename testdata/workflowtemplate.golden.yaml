apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
    name: k8ace-matrix-nvidia
spec:
    entrypoint: main
    templates:
        - name: main
          dag:
            tasks:
                - name: base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                  template: base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                - name: base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                  template: base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                  dependencies:
                    - base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                - name: app-image-nvidia-pytorch-2-5-1-pytorch-cuda
                  template: app-image-nvidia-pytorch-2-5-1-pytorch-cuda
                  dependencies:
                    - base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
                - name: app-test-nvidia-pytorch-2-5-1-pytorch-cuda
                  template: app-test-nvidia-pytorch-2-5-1-pytorch-cuda
                  dependencies:
                    - app-image-nvidia-pytorch-2-5-1-pytorch-cuda
        - name: base-image-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
          container:
            image: kaniko:test
            command:
                - /kaniko/executor
            args:
                - --context=s3://kaniko-contexts/testdata/context.tar.gz
                - --dockerfile=dockerfiles/base_image/nvidia/cuda_base/cuda12.4-devel-ubuntu22.04/Dockerfile
                - --destination=172.20.47.182:5000/k8ace/cuda_base-cuda12.4-devel-ubuntu22.04
                - --skip-push-permission-check
                - --insecure-registry=172.20.47.182:5000
                - --build-arg=BASE_IMAGE=nvidia/cuda:cuda12.4-devel-ubuntu22.04
            env:
                - name: AWS_REGION
                  value: us-east-1
                - name: S3_ENDPOINT
                  value: http://172.20.47.182:9000
                - name: S3_FORCE_PATH_STYLE
                  value: "true"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                        name: context-creds
                        key: accessKey
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                        name: context-creds
                        key: secretKey
            volumeMounts:
                - name: registry-config
                  mountPath: /kaniko/.docker
                  readOnly: true
        - name: base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04
          container:
            image: 172.20.47.182:5000/k8ace/cuda_base-cuda12.4-devel-ubuntu22.04
            command:
                - sh
                - -c
            args:
                - |
                  echo '[base_test] task=base-test-nvidia-cuda-base-cuda12-4-devel-ubuntu22-04 image=172.20.47.182:5000/k8ace/cuda_base-cuda12.4-devel-ubuntu22.04';
                  echo '[base_test] running check 1';
                  (
                  set -eu
                  echo "[base_test] demo smoke: python/pip only"
                  python3 --version
                  (pip --version || pip3 --version)
                  echo "[base_test] PASS: base image has basic Python runtime"

                  ) || { echo '[base_test] FAILED check 1'; exit 1; };
                  echo '[base_test] ALL PASSED';
        - name: app-image-nvidia-pytorch-2-5-1-pytorch-cuda
          container:
            image: kaniko:test
            command:
                - /kaniko/executor
            args:
                - --context=s3://kaniko-contexts/testdata/context.tar.gz
                - --dockerfile=dockerfiles/app_image/nvidia/pytorch/2.5.1/pytorch-cuda/Dockerfile
                - --destination=172.20.47.182:5000/k8ace/pytorch2.5.1-nvidia-pytorch-cuda-dev
                - --skip-push-permission-check
                - --insecure-registry=172.20.47.182:5000
                - --build-arg=BASE_IMAGE=172.20.47.182:5000/k8ace/cuda_base-cuda12.4-devel-ubuntu22.04
                - --build-arg=CUDA_VERSION=12.4
                - --build-arg=PYTORCH_VERSION=2.5.1
            env:
                - name: AWS_REGION
                  value: us-east-1
                - name: S3_ENDPOINT
                  value: http://172.20.47.182:9000
                - name: S3_FORCE_PATH_STYLE
                  value: "true"
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                        name: context-creds
                        key: accessKey
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                        name: context-creds
                        key: secretKey
            volumeMounts:
                - name: registry-config
                  mountPath: /kaniko/.docker
                  readOnly: true
        - name: app-test-nvidia-pytorch-2-5-1-pytorch-cuda
          container:
            image: 172.20.47.182:5000/k8ace/pytorch2.5.1-nvidia-pytorch-cuda-dev
            command:
                - sh
                - -c
            args:
                - |
                  echo '[app_test] task=app-test-nvidia-pytorch-2-5-1-pytorch-cuda image=172.20.47.182:5000/k8ace/pytorch2.5.1-nvidia-pytorch-cuda-dev';
                  echo '[app_test] running check 1';
                  (
                  if [ -f /opt/k8ace/hack/test/smoke.sh ]; then bash /opt/k8ace/hack/test/smoke.sh L1 pytorch nvidia; else python3 --version && (pip list --format=columns 2>/dev/null || pip3 list --format=columns 2>/dev/null || true); fi
                  ) || { echo '[app_test] FAILED check 1'; exit 1; };
                  echo '[app_test] ALL PASSED';
    volumes:
        - name: registry-config
          secret:
            secretName: regcred
            items:
                - key: .dockerconfigjson
                  path: config.json
