schema_version: "1.0"
project: "k8ace-matrix"
registry_prefix: "172.20.47.182:5000/k8ace"

build_pipeline:
  stages:
    - name: "host_driver"
      description: "host driver"
      parallel: true
      matrix_dimension: "hardware"
    - name: "base_image"
      description: "base"
      parallel: true
      matrix_dimension: "base"
      depends_on: ["host_driver"]
    - name: "base_test"
      description: "base smoke"
      parallel: true
      matrix_dimension: "base_test"
      depends_on: ["base_image"]
    - name: "app_image"
      description: "app"
      parallel: true
      matrix_dimension: "app"
      depends_on: ["base_test"]
    - name: "app_test"
      description: "app smoke"
      parallel: true
      matrix_dimension: "app_test"
      depends_on: ["app_image"]
  cache:
    type: "registry"
    ttl: "168h"
    key_template: "k8ace/cache/{{ .Hardware.Vendor }}/{{ .Stage.Name }}/{{ .Checksum }}"

base_image_matrix:
  cuda_base:
    source: "nvidia/cuda"
    variants:
      - tag_suffix: "cuda12.4-devel-ubuntu22.04"
        cuda_version: "12.4"
        cuda_short: "cuda-124"
        ubuntu_version: "22.04"
        python_version: "3.10"
        min_driver_linux: "550.54.15"
        k8ace_compatible: ["nvidia"]

application_matrix:
  deep_learning:
    pytorch:
      versions: ["2.5.1"]
      variants:
        - name: "pytorch-cuda"
          accelerator: "cuda-124"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["torch==${version}", "torchvision", "torchaudio"]
          build_args:
            PYTORCH_VERSION: "${version}"
            CUDA_VERSION: "${base.cuda_version}"

build_args_overrides:
  nvidia:
    BASE_IMAGE: "nvidia/cuda:cuda12.4-devel-ubuntu22.04"

priority_build_list:
  tier2_frameworks:
    - "k8ace/pytorch2.5.1-nvidia-cuda12.4"

naming_convention:
  template: "{{ .RegistryPrefix }}/{{ .AppName }}-{{ .Hardware.Vendor }}-{{ .VersionSuffix }}"

ci_cd:
  argo_workflows:
    namespace: "default"
    service_account: "argo-workflow"
    kaniko_image: "kaniko:test"
    build_context:
      default: "s3://kaniko-contexts/testdata/context.tar.gz"
      env:
        AWS_REGION: "us-east-1"
        S3_ENDPOINT: "http://172.20.47.182:9000"
        S3_FORCE_PATH_STYLE: "true"
      secret_name: "context-creds"
      secret_env:
        AWS_ACCESS_KEY_ID: "accessKey"
        AWS_SECRET_ACCESS_KEY: "secretKey"
    insecure_registries:
      - "172.20.47.182:5000"
    skip_push_permission_check: true
    registry_secret_name: "regcred"
    cache:
      enabled: false
      repo_template: "{{ .RegistryPrefix }}/cache/{{ .Hardware }}/{{ .Stage }}"
