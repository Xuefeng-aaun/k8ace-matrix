# =============================================================================
# 异构 AI 加速卡镜像构建矩阵 (Matrix Build Configuration)
# =============================================================================
# 版本: 1.0.0
# 描述: 支持 11+ 厂商异构加速卡的宿主机驱动、基础镜像、上层应用环境构建矩阵
# =============================================================================

schema_version: "1.0"
project: "k8ace-matrix"
registry_prefix: "xuefengaaun/k8ace"

# =============================================================================
# 一、加速卡硬件矩阵定义 (Hardware Matrix)
# =============================================================================
# 已迁移到 Go 常量：internal/hardware（每个厂商字段差异大且变化频率低）
#
# =============================================================================
# 二、基础镜像矩阵 (Base Images)
# =============================================================================
base_image_matrix:
  
  # ---------------------------------------------------------------------------
  # NVIDIA CUDA 基础镜像
  # ---------------------------------------------------------------------------
  cuda_base:
    source: "nvidia/cuda"
    variants:
      - tag_suffix: "cuda12.4-devel-ubuntu22.04"
        cuda_version: "12.4"
        cudnn_version: "9.1.0"
        ubuntu_version: "22.04"
        python_version: "3.10"
        upstream_tag: "12.4.1-devel-ubuntu22.04"
        driver_min: "550.54.14"
        status: "recommended"
        pytorch_index: "https://download.pytorch.org/whl/cu124"
        pytorch_version: "2.4.0+cu124"
        k8ace_compatible: ["nvidia"]
      - tag_suffix: "cuda12.2-devel-ubuntu22.04"
        cuda_version: "12.2"
        cudnn_version: "8.9.7"
        ubuntu_version: "22.04"
        python_version: "3.10"
        upstream_tag: "12.2.0-devel-ubuntu22.04"
        driver_min: "535.54.03"
        status: "stable"
        pytorch_index: "https://download.pytorch.org/whl/cu121"
        pytorch_version: "2.1.0+cu121"
        k8ace_compatible: ["nvidia"]
      - tag_suffix: "cuda11.8-devel-ubuntu20.04"
        cuda_version: "11.8"
        cudnn_version: "8.6.0"
        ubuntu_version: "20.04"
        python_version: "3.9"
        upstream_tag: "11.8.0-devel-ubuntu20.04"
        driver_min: "520.61.05"
        status: "legacy"
        k8ace_compatible: ["nvidia"]
    
  # ---------------------------------------------------------------------------
  # 华为 CANN 基础镜像
  # ---------------------------------------------------------------------------
  cann_base:
    source: "ascend-base"
    variants:
      - tag_suffix: "cann8.0-ubuntu22.04"
        cann_version: "8.0.RC2"
        driver_version: "23.0.3"
        ubuntu_version: "22.04"
        python_version: "3.9"
        status: "stable"
        k8ace_compatible: ["ascend"]
      - tag_suffix: "cann8.0-ubuntu20.04"
        cann_version: "8.0.RC2"
        driver_version: "23.0.3"
        ubuntu_version: "20.04"
        python_version: "3.8"
        status: "legacy"
        k8ace_compatible: ["ascend"]
    
  # ---------------------------------------------------------------------------
  # 寒武纪 CNML 基础镜像
  # ---------------------------------------------------------------------------
  cnml_base:
    source: "cambricon-base"
    variants:
      - tag_suffix: "cntoolkit3.8-ubuntu22.04"
        cntoolkit_version: "3.8.2"
        driver_version: "4.20.18"
        ubuntu_version: "22.04"
        python_version: "3.10"
        k8ace_compatible: ["cambricon"]
    
  # ---------------------------------------------------------------------------
  # 海光 ROCm 基础镜像
  # ---------------------------------------------------------------------------
  rocm_base:
    source: "rocm-base"
    variants:
      - tag_suffix: "rocm5.6-ubuntu22.04"
        rocm_version: "5.6.0"
        driver_version: "4.2.1"
        ubuntu_version: "22.04"
        python_version: "3.10"
        k8ace_compatible: ["hygon"]
    
  # ---------------------------------------------------------------------------
  # 沐曦 MXMACA 基础镜像
  # ---------------------------------------------------------------------------
  mxmaca_base:
    source: "metax-base"
    variants:
      - tag_suffix: "mxmaca2.0-ubuntu22.04"
        mxmaca_version: "2.0.0"
        driver_version: "2.22.0"
        ubuntu_version: "22.04"
        python_version: "3.10"
        k8ace_compatible: ["metax"]
    
  # ---------------------------------------------------------------------------
  # 通用 Ubuntu 基础镜像 (CPU/其他加速卡)
  # ---------------------------------------------------------------------------
  ubuntu_base:
    source: "ubuntu"
    variants:
      - tag_suffix: "ubuntu22.04-py3.10"
        ubuntu_version: "22.04"
        python_version: "3.10"
        k8ace_compatible: ["iluvatar", "enflame", "kunlunxin", "moorethreads"]
      - tag_suffix: "ubuntu20.04-py3.9"
        ubuntu_version: "20.04"
        python_version: "3.9"
        k8ace_compatible: ["iluvatar", "enflame", "kunlunxin", "moorethreads"]
  
  # ---------------------------------------------------------------------------
  # Intel oneAPI 基础镜像
  # ---------------------------------------------------------------------------
  oneapi_base:
    source: "ubuntu"
    variants:
      - tag_suffix: "oneapi2024-ubuntu22.04"
        oneapi_version: "2024"
        ubuntu_version: "22.04"
        python_version: "3.10"
        status: "stable"
        k8ace_compatible: ["intel"]

# =============================================================================
# 三、上层应用环境矩阵 (Application Environments)
# 基于 K8Ace 镜像清单扩展
# =============================================================================
application_matrix:
  
  # ---------------------------------------------------------------------------
  # 深度学习框架 (Deep Learning Frameworks)
  # ---------------------------------------------------------------------------
  deep_learning:
    pytorch:
      versions: ["2.5.1", "2.4.0", "2.3.1"]
      variants:
        - name: "pytorch-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["torchvision", "torchaudio", "transformers", "accelerate"]
          build_args:
            PYTORCH_VERSION: "${version}"
            CUDA_VERSION: "${base.cuda_version}"
        - name: "pytorch-cann"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["torch_npu", "torchvision", "torchaudio"]
          build_args:
            PYTORCH_VERSION: "${version}"
            CANN_VERSION: "${base.cann_version}"
        - name: "pytorch-mlu"
          base_ref: "cnml_base"
          hardware: ["cambricon"]
          additional_packages: ["torch_mlu", "torchvision"]
          build_args:
            PYTORCH_VERSION: "${version}"
            CNTOOLKIT_VERSION: "${base.cntoolkit_version}"
        - name: "pytorch-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          additional_packages: ["torch", "torchvision", "torchaudio", "--index-url https://download.pytorch.org/whl/cpu"]
    
    tensorflow:
      versions: ["2.17.0", "2.16.1", "2.15.0"]
      variants:
        - name: "tensorflow-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["tensorflow[and-cuda]", "keras"]
        - name: "tensorflow-cann"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["tensorflow-cann"]
    
    jax:
      versions: ["0.4.35", "0.4.30"]
      variants:
        - name: "jax-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["jax[cuda12_pip]", "flax", "optax", "orbax"]
        - name: "jax-cann"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["jax-ascend", "flax", "optax"]
    
    paddlepaddle:
      versions: ["2.6.0"]
      variants:
        - name: "paddle-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["paddlepaddle-gpu"]
        - name: "paddle-rocm"
          base_ref: "rocm_base"
          hardware: ["hygon"]
          additional_packages: ["paddlepaddle-rocm"]
        - name: "paddle-mlu"
          base_ref: "cnml_base"
          hardware: ["cambricon"]
          additional_packages: ["paddlepaddle-mlu"]
        - name: "paddle-xpu"
          base_ref: "ubuntu_base"
          hardware: ["kunlunxin"]
          additional_packages: ["paddlepaddle-xpu"]

  # ---------------------------------------------------------------------------
  # 大语言模型 / AIGC (LLM & AIGC)
  # ---------------------------------------------------------------------------
  llm_aigc:
    vllm:
      versions: ["0.6.3", "0.6.2"]
      variants:
        - name: "vllm-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["vllm", "transformers>=4.45.0", "accelerate", "bitsandbytes"]
        - name: "vllm-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["vllm-ascend", "transformers"]
        - name: "vllm-mlu"
          base_ref: "cnml_base"
          hardware: ["cambricon"]
          additional_packages: ["vllm-mlu", "transformers"]
    
    llama_factory:
      versions: ["0.9.0"]
      variants:
        - name: "llamafactory-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["llamafactory[metrics,deepspeed,bitsandbytes]", "transformers", "datasets"]
        - name: "llamafactory-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["llamafactory[metrics]", "torch_npu"]
    
    xtuner:
      versions: ["0.1.0"]
      variants:
        - name: "xtuner-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["xtuner", "deepspeed", "mmengine"]
        - name: "xtuner-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["xtuner", "torch_npu"]
    
    langchain:
      versions: ["0.3.0"]
      variants:
        - name: "langchain-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["langchain", "langchain-community", "llama-index", "chromadb", "sentence-transformers"]
        - name: "langchain-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["langchain", "llama-index", "chromadb"]
    
    stable_diffusion:
      versions: ["3.5"]
      variants:
        - name: "sd-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["diffusers", "transformers", "xformers", "controlnet-aux", "accelerate"]
        - name: "sd-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["diffusers", "transformers", "torch_npu"]
        - name: "sd-musa"
          base_ref: "mxmaca_base"
          hardware: ["metax"]
          additional_packages: ["diffusers", "transformers", "musa-toolkit"]
    
    comfyui:
      versions: ["latest"]
      variants:
        - name: "comfyui-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          recommended_driver: ">= 550.54.14"
          additional_packages: ["comfyui", "comfyui-manager", "comfyui-controlnet-aux"]
          preinstalled_nodes: ["ComfyUI-Manager", "ComfyUI-Custom-Scripts", "ComfyUI-Impact-Pack"]
    
    sd_webui:
      versions: ["1.10.0"]
      variants:
        - name: "sd-webui-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          recommended_driver: ">= 550.54.14"
          notes: "建议搭配 CUDA 12.4 基础镜像与 PyTorch cu124 wheel"
          additional_packages: ["automatic1111-webui", "controlnet"]
          extensions: ["sd-webui-controlnet", "adetailer", "segment-anything"]

  # ---------------------------------------------------------------------------
  # 数据科学 (Data Science)
  # ---------------------------------------------------------------------------
  data_science:
    pandas_stack:
      versions: ["2.2"]
      variants:
        - name: "pandas-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["pandas", "numpy", "scipy", "scikit-learn", "seaborn", "plotly", "cupy-cuda12x"]
        - name: "pandas-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["pandas", "numpy", "scipy", "scikit-learn", "seaborn", "plotly", "cann-numpy"]
        - name: "pandas-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu", "iluvatar", "enflame", "kunlunxin", "moorethreads"]
          additional_packages: ["pandas", "numpy", "scipy", "scikit-learn", "seaborn", "plotly"]
    
    pyspark:
      versions: ["3.5"]
      variants:
        - name: "pyspark-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["pyspark", "findspark", "pyarrow", "cudf"]
        - name: "pyspark-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["pyspark", "findspark", "pyarrow"]
        - name: "pyspark-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          additional_packages: ["pyspark", "findspark", "pyarrow"]
    
    rapids:
      versions: ["24.10"]
      variants:
        - name: "rapids-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["rapids", "cudf", "cuml", "cugraph", "cuspatial"]
          requires_cuda: "12.0"

  # ---------------------------------------------------------------------------
  # 计算机视觉 (Computer Vision)
  # ---------------------------------------------------------------------------
  computer_vision:
    opencv:
      versions: ["4.10"]
      variants:
        - name: "opencv-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["opencv-python", "opencv-contrib-python", "imutils", "scikit-image", "cupy"]
          build_flags: "-D WITH_CUDA=ON -D CUDA_ARCH_BIN=7.5,8.0,8.6,8.9,9.0"
        - name: "opencv-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["opencv-python", "opencv-contrib-python", "imutils", "scikit-image", "acl-opencv"]
        - name: "opencv-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu", "cambricon", "hygon", "metax", "iluvatar", "enflame", "kunlunxin", "moorethreads"]
          additional_packages: ["opencv-python", "opencv-contrib-python", "imutils", "scikit-image"]
    
    detectron2:
      versions: ["0.6"]
      variants:
        - name: "detectron2-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["detectron2", "torchvision", "pycocotools", "fvcore"]
          build_from_source: true
    
    yolo:
      versions: ["11"]
      variants:
        - name: "yolo-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["ultralytics", "supervision", "roboflow"]
        - name: "yolo-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["ultralytics", "supervision", "torch_npu"]

  # ---------------------------------------------------------------------------
  # 机器人 / ROS (Robotics)
  # ---------------------------------------------------------------------------
  robotics:
    ros_noetic:
      versions: ["noetic"]
      variants:
        - name: "ros-noetic-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          ubuntu_version: "20.04"
          additional_packages: ["ros-noetic-desktop-full", "gazebo11", "rviz", "turtlebot3", "ros-noetic-moveit"]
          cuda_enabled: true
        - name: "ros-noetic-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          ubuntu_version: "20.04"
          additional_packages: ["ros-noetic-desktop-full", "gazebo11", "rviz", "turtlebot3"]
    
    ros2_humble:
      versions: ["humble"]
      variants:
        - name: "ros2-humble-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          ubuntu_version: "22.04"
          additional_packages: ["ros-humble-desktop", "gazebo", "rviz2", "nav2", "slam_toolbox", "ros-humble-moveit2"]
          cuda_enabled: true
        - name: "ros2-humble-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          ubuntu_version: "22.04"
          additional_packages: ["ros-humble-desktop", "gazebo", "rviz2", "nav2", "slam_toolbox", "ros-humble-ascend-bridge"]
        - name: "ros2-humble-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          ubuntu_version: "22.04"
          additional_packages: ["ros-humble-desktop", "gazebo", "rviz2", "nav2", "slam_toolbox"]
    
    rl_robotics:
      versions: ["latest"]
      variants:
        - name: "rl-robotics-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["gymnasium", "stable-baselines3", "robosuite", "pybullet", "mujoco"]
        - name: "rl-robotics-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["gymnasium", "rllib-ascend", "robosuite"]

  # ---------------------------------------------------------------------------
  # 高性能计算 (HPC)
  # ---------------------------------------------------------------------------
  hpc:
    cuda_samples:
      versions: ["12.4"]
      variants:
        - name: "cuda-samples"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["nvidia-hpc-sdk", "cuda-samples"]
          samples_path: "/usr/local/cuda/samples"
    
    openmpi:
      versions: ["5.0"]
      variants:
        - name: "openmpi-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["openmpi", "mpi4py", "nccl", "nvshmem"]
          enable_cuda_aware: true
        - name: "openmpi-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["openmpi", "mpi4py", "hccl"]
        - name: "openmpi-rocm"
          base_ref: "rocm_base"
          hardware: ["hygon"]
          additional_packages: ["openmpi", "mpi4py", "rccl"]
    
    oneapi:
      versions: ["2025"]
      variants:
        - name: "oneapi-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          additional_packages: ["intel-oneapi-dpcpp-cpp", "intel-oneapi-mkl", "intel-oneapi-mpi"]

  # ---------------------------------------------------------------------------
  # 计算生物学 (Computational Biology)
  # ---------------------------------------------------------------------------
  bioinformatics:
    alphafold:
      versions: ["2.3"]
      variants:
        - name: "alphafold-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["alphafold", "jax[cuda12_pip]", "dm-haiku", "jaxlib"]
          dependencies: ["hh-suite", "jackhmmer", "kalign"]
        - name: "alphafold-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["alphafold-ascend", "jax-ascend"]
    
    biopython:
      versions: ["1.83"]
      variants:
        - name: "biopython-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["biopython", "pandas", "matplotlib", "scikit-bio", "cupy"]
        - name: "biopython-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["biopython", "pandas", "matplotlib", "scikit-bio"]
        - name: "biopython-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          additional_packages: ["biopython", "pandas", "matplotlib", "scikit-bio"]
    
    gromacs:
      versions: ["2024"]
      variants:
        - name: "gromacs-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["gromacs", "gmxapi"]
          build_flags: "-DGMX_GPU=CUDA -DCUDA_TOOLKIT_ROOT_DIR=/usr/local/cuda"
        - name: "gromacs-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["gromacs-ascend"]
          build_flags: "-DGMX_GPU=ASCEND"

  # ---------------------------------------------------------------------------
  # 电子工程 / 通信 (EE & Communication)
  # ---------------------------------------------------------------------------
  signal_processing:
    gnuradio:
      versions: ["3.10"]
      variants:
        - name: "gnuradio-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["gnuradio", "uhd", "gr-inspector", "cupy"]
        - name: "gnuradio-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          additional_packages: ["gnuradio", "uhd", "gr-inspector"]
    
    jupyter_sdr:
      versions: ["latest"]
      variants:
        - name: "jupyter-sdr-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["pySDR", "scipy", "numpy", "matplotlib", "cupy"]
        - name: "jupyter-sdr-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          additional_packages: ["pySDR", "scipy", "numpy", "matplotlib"]

  # ---------------------------------------------------------------------------
  # 艺术设计 / 3D (Design & 3D)
  # ---------------------------------------------------------------------------
  design:
    blender:
      versions: ["4.2"]
      variants:
        - name: "blender-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["blender", "bpy"]
          cuda_enabled: true
        - name: "blender-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["blender", "bpy"]
    
    fooocus:
      versions: ["latest"]
      variants:
        - name: "fooocus-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["fooocus", "torch", "xformers"]
          default_model: "juggernautXL_v9"
        - name: "fooocus-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["fooocus-ascend", "torch_npu"]

  # ---------------------------------------------------------------------------
  # 通用语言开发 (General Languages)
  # ---------------------------------------------------------------------------
  languages:
    r_stats:
      versions: ["4.3"]
      variants:
        - name: "r-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["r-base", "rstudio-server", "tidyverse", "gpuR"]
        - name: "r-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          additional_packages: ["r-base", "rstudio-server", "tidyverse"]
    
    julia:
      versions: ["1.10"]
      variants:
        - name: "julia-cuda"
          base_ref: "cuda_base"
          hardware: ["nvidia"]
          additional_packages: ["julia", "CUDA.jl", "IJulia", "Plots"]
        - name: "julia-ascend"
          base_ref: "cann_base"
          hardware: ["ascend"]
          additional_packages: ["julia", "Ascend.jl", "IJulia", "Plots"]
        - name: "julia-cpu"
          base_ref: "ubuntu_base"
          hardware: ["cpu"]
          additional_packages: ["julia", "IJulia", "Plots"]

# =============================================================================
# 四、构建管道配置 (Build Pipeline)
# =============================================================================
build_pipeline:
  
  # 构建阶段定义
  stages:
    - name: "host_driver"
      description: "宿主机驱动安装包构建"
      parallel: true
      matrix_dimension: "hardware"
    
    - name: "base_image"
      description: "基础容器镜像构建"
      parallel: true
      matrix_dimension: "base"
      depends_on: ["host_driver"]
    
    - name: "app_image"
      description: "应用层镜像构建"
      parallel: true
      matrix_dimension: "app"
      depends_on: ["base_image"]
    
    - name: "test"
      description: "镜像测试验证"
      parallel: true
      matrix_dimension: "test"
      depends_on: ["app_image"]
    
    - name: "push"
      description: "镜像推送"
      parallel: false
      matrix_dimension: "registry"
      depends_on: ["test"]
  
  # 触发条件
  triggers:
    webhook:
      enabled: true
      paths: ["/dockerfiles/**", "/scripts/**", "/matrix.yaml"]
    schedule:
      enabled: true
      cron: "0 2 * * 0"  # 每周日凌晨2点
    manual:
      enabled: true
      allow_matrix_selection: true
  
  # 缓存配置
  cache:
    type: "registry"
    ttl: "168h"  # 7天
    key_template: "k8ace/cache/{{ .Hardware.Vendor }}/{{ .Stage.Name }}/{{ .Checksum }}"

# =============================================================================
# 五、宿主机驱动安装矩阵 (Host Driver Installation)
# =============================================================================
host_driver_matrix:
  
  nvidia:
    installation_method: "runfile"  # 或 "package"
    pre_install_script: |
      #!/bin/bash
      # 禁用 Nouveau
      echo "blacklist nouveau" > /etc/modprobe.d/blacklist-nouveau.conf
      echo "options nouveau modeset=0" >> /etc/modprobe.d/blacklist-nouveau.conf
      dracut --force
    driver_packages:
      - name: "nvidia-driver-{{ .DriverVersion }}"
        url_template: "https://us.download.nvidia.com/XFree86/Linux-x86_64/{{ .DriverVersion }}/NVIDIA-Linux-x86_64-{{ .DriverVersion }}.run"
        checksum_verify: true
      - name: "cuda-toolkit"
        url_template: "https://developer.download.nvidia.com/compute/cuda/{{ .CudaVersion }}/local_installers/cuda_{{ .CudaVersion }}_{{ .DriverVersion }}_linux.run"
    post_install_script: |
      #!/bin/bash
      nvidia-smi -pm 1  # 持久模式
      nvidia-smi -e 0   # 禁用 ECC (可选)
    k8ace_device_plugin:
      image: "projectk8ace/k8ace-device-plugin-nvidia:latest"
      config_map: "k8ace-device-plugin-nvidia"
      node_selector: "accelerator=nvidia"
  
  ascend:
    installation_method: "package"
    repository: "https://repo.huaweicloud.com/ascend"
    driver_packages:
      - name: "ascend-driver"
        package_pattern: "Ascend-hdk-{{ .CardModel }}-driver_{{ .DriverVersion }}_linux-aarch64.run"
      - name: "ascend-firmware"
        package_pattern: "Ascend-hdk-{{ .CardModel }}-firmware_{{ .FirmwareVersion }}.run"
      - name: "cann-toolkit"
        package_pattern: "Ascend-cann-toolkit_{{ .CannVersion }}_linux-aarch64.run"
    post_install_script: |
      #!/bin/bash
      source /usr/local/Ascend/ascend-toolkit/set_env.sh
      npu-smi info
    k8ace_device_plugin:
      image: "projectk8ace/ascend-device-plugin:latest"
      config_map: "k8ace-device-plugin-ascend"
      node_selector: "accelerator=ascend"
      vnpu_enabled: true
  
  cambricon:
    installation_method: "package"
    driver_packages:
      - name: "cambricon-driver"
        package_pattern: "cambricon-driver_{{ .DriverVersion }}.deb"
      - name: "cntoolkit"
        package_pattern: "cntoolkit_{{ .CntoolkitVersion }}.tar.gz"
    k8ace_device_plugin:
      image: "projectk8ace/k8ace-device-plugin-cambricon:latest"
      node_selector: "accelerator=cambricon"
  
  hygon:
    installation_method: "package"
    repository: "https://repo.hygon.cn/dcu"
    driver_packages:
      - name: "hygon-dcu-driver"
        package_pattern: "hygon-dcu-driver-{{ .DriverVersion }}.tar.gz"
      - name: "rocm"
        package_pattern: "rocm-{{ .RocmVersion }}.tar.gz"
    k8ace_device_plugin:
      image: "projectk8ace/k8ace-device-plugin-hygon:latest"
      node_selector: "accelerator=hygon"
  
  metax:
    installation_method: "package"
    driver_packages:
      - name: "metax-driver"
        package_pattern: "metax-driver-{{ .DriverVersion }}.run"
      - name: "mxmaca"
        package_pattern: "mxmaca-{{ .MxmacaVersion }}.run"
    k8ace_device_plugin:
      image: "projectk8ace/k8ace-device-plugin-metax:latest"
      node_selector: "accelerator=metax"
      qos_modes: ["BestEffort", "FixedShare", "BurstShare"]

# =============================================================================
# 六、镜像命名规范 (Image Naming Convention)
# =============================================================================
naming_convention:
  template: "{{ .RegistryPrefix }}/{{ .AppName }}-{{ .Hardware.Vendor }}-{{ .VersionSuffix }}"
  examples:
    - description: "NVIDIA PyTorch 2.5.1 with CUDA 12.4"
      result: "k8ace/pytorch2.5.1-nvidia-cuda12.4"
    - description: "Ascend PyTorch 2.5.1 with CANN 8.0"
      result: "k8ace/pytorch2.5.1-ascend-cann8.0"
    - description: "Cambricon PyTorch 2.5.1 with CNML 3.8"
      result: "k8ace/pytorch2.5.1-cambricon-cnml3.8"
    - description: "CPU-only PyTorch 2.5.1"
      result: "k8ace/pytorch2.5.1-cpu"
  
  tags:
    - "{{ .Version }}-{{ .CudaVersion }}"      # 详细版本: 2.5.1-cuda12.4
    - "{{ .MajorMinor }}-{{ .CudaShort }}"     # 简化版本: 2.5-cuda12
    - "latest-{{ .Hardware.Vendor }}"          # 最新标签: latest-nvidia
    - "{{ .GitShortSha }}"                     # Git 短哈希

# =============================================================================
# 七、k8ace 资源配置模板 (k8ace Resource Templates)
# =============================================================================
k8ace_resources:
  
  # NVIDIA GPU 资源配置
  nvidia:
    apiVersion: "v1"
    kind: "Pod"
    metadata:
      annotations:
        k8ace.io/gpu-scheduler: "k8ace-scheduler"
    spec:
      containers:
        - resources:
            limits:
              nvidia.com/gpu: "1"           # 物理 GPU 数量
              nvidia.com/gpumem: "8000"     # 显存限制 (MB)
              nvidia.com/gpucores: "50"     # 计算核心限制 (%)
  
  # 华为昇腾资源配置
  ascend:
    apiVersion: "v1"
    kind: "Pod"
    metadata:
      annotations:
        k8ace.io/device-plugin: "ascend-device-plugin"
        k8ace.io/vnpu: "enabled"
    spec:
      containers:
        - resources:
            limits:
              huawei.com/Ascend910: "1"
              huawei.com/vnpu-memory: "4000"
  
  # 寒武纪资源配置
  cambricon:
    apiVersion: "v1"
    kind: "Pod"
    metadata:
      annotations:
        k8ace.io/device-plugin: "k8ace-device-plugin-cambricon"
    spec:
      containers:
        - resources:
            limits:
              cambricon.com/mlu: "1"
              cambricon.com/mlu-memory: "4000"

# =============================================================================
# 八、优先级构建清单 (Priority Build List)
# =============================================================================
priority_build_list:
  # Tier 1: 核心基础镜像 (必须首先构建)
  tier1_core:
    - "k8ace/ubuntu22.04-py3.10"
    - "k8ace/cuda12.4-base"
    - "k8ace/cann8.0-base"
  
  # Tier 2: 主流深度学习框架 (覆盖 80% 需求)
  tier2_frameworks:
    - "k8ace/pytorch2.5.1-nvidia-cuda12.4"
    - "k8ace/pytorch2.5.1-ascend-cann8.0"
    - "k8ace/tensorflow2.17-nvidia-cuda12.4"
    - "k8ace/vllm-0.6.3-nvidia-cuda12.4"
    - "k8ace/vllm-0.6.3-ascend-cann8.0"
  
  # Tier 3: AIGC/大模型应用
  tier3_aigc:
    - "k8ace/stable-diffusion-3.5-nvidia-cuda12.4"
    - "k8ace/comfyui-nvidia-cuda12.4"
    - "k8ace/xtuner-0.1-nvidia-cuda12.4"
  
  # Tier 4: 垂直领域应用
  tier4_vertical:
    - "k8ace/ros2-humble-nvidia-cuda12.4"
    - "k8ace/alphafold-2.3-nvidia-cuda12.4"
    - "k8ace/gromacs-2024-nvidia-cuda12.4"
  
  # Tier 5: 国产加速卡适配
  tier5_domestic:
    - "k8ace/pytorch2.5.1-cambricon-cnml3.8"
    - "k8ace/pytorch2.5.1-metax-mxmaca2.0"
    - "k8ace/pytorch2.5.1-hygon-rocm5.6"

# =============================================================================
# 九、测试矩阵 (Test Matrix)
# =============================================================================
test_matrix:
  
  smoke_tests:
    - name: "container_start"
      command: "docker run --rm {{ .Image }} echo 'Container started successfully'"
      timeout: "30s"
    
    - name: "python_import"
      command: "docker run --rm {{ .Image }} python -c 'import {{ .MainPackage }}; print({{ .MainPackage }}.__version__)'"
      timeout: "60s"
    
    - name: "gpu_visibility"
      command: "docker run --gpus all --rm {{ .Image }} {{ .GpuCheckCommand }}"
      nvidia: "nvidia-smi"
      ascend: "npu-smi info"
      cambricon: "cnmon"
      hygon: "rocm-smi"
      metax: "mx-smi"
      timeout: "60s"
  
  functional_tests:
    - name: "simple_training"
      script: |
        python -c "
        import torch
        {{ .HardwareSpecificInit }}
        x = torch.randn(1000, 1000).{{ .Device }}
        y = torch.matmul(x, x)
        print(f'Computation successful on {y.device}')
        "
      timeout: "300s"
  
  k8ace_integration_tests:
    - name: "vgpu_allocation"
      manifest: "test-manifests/vgpu-test-pod.yaml"
      validation: "kubectl wait --for=condition=Ready pod/vgpu-test --timeout=300s"
    
    - name: "memory_isolation"
      manifest: "test-manifests/memory-limit-test.yaml"
      validation: "kubectl logs memory-limit-test | grep 'OutOfMemoryError'"

# =============================================================================
# 十、构建参数覆盖 (Build Argument Overrides)
# =============================================================================
build_args_overrides:
  
  # 针对特定硬件的构建参数
  nvidia:
    BASE_IMAGE: "nvidia/cuda:{{ .CudaVersion }}-devel-ubuntu{{ .UbuntuVersion }}"
    GPU_ARCH: "all"
    NVCC_FLAGS: "-gencode arch=compute_70,code=sm_70 -gencode arch=compute_80,code=sm_80 -gencode arch=compute_90,code=sm_90"
  
  ascend:
    BASE_IMAGE: "ascend-base:{{ .CannVersion }}-ubuntu{{ .UbuntuVersion }}"
    CANN_PATH: "/usr/local/Ascend/ascend-toolkit/latest"
    ACL_BACKEND: "ascend"
  
  cambricon:
    BASE_IMAGE: "cambricon-base:{{ .CntoolkitVersion }}-ubuntu{{ .UbuntuVersion }}"
    CNML_PATH: "/usr/local/neuware"
  
  hygon:
    BASE_IMAGE: "rocm-base:{{ .RocmVersion }}-ubuntu{{ .UbuntuVersion }}"
    ROCM_PATH: "/opt/rocm"
  
  metax:
    BASE_IMAGE: "metax-base:{{ .MxmacaVersion }}-ubuntu{{ .UbuntuVersion }}"
    MXMACA_PATH: "/usr/local/mxmaca"
  
  intel:
    BASE_IMAGE: "ubuntu:22.04"

# =============================================================================
# 十一、CI/CD 集成配置 (CI/CD Integration)
# =============================================================================
ci_cd:
  
  github_actions:
    workflow_file: ".github/workflows/k8ace-matrix-build.yml"
    matrix_strategy:
      fail-fast: false
      max-parallel: 5
    secrets:
      - "REGISTRY_USERNAME"
      - "REGISTRY_PASSWORD"
      - "SIGNING_KEY"
  
  gitlab_ci:
    stages: ["build-base", "build-app", "test", "push"]
    parallel_matrix:
      - HARDWARE: ["nvidia", "ascend", "cambricon"]
        APP: ["pytorch", "tensorflow", "vllm"]
  
  tekton:
    pipeline_ref: "k8ace-matrix-pipeline"
    task_refs:
      build: "kaniko-build-task"
      test: "container-test-task"
      push: "skopeo-push-task"
  
  argo_workflows:
    namespace: "default"
    service_account: "argo-workflow"
    kind_default: "workflowtemplate"
    submit_mode_default: "argo-server"
    argo_server: ""
    kaniko_image: "gcr.io/kaniko-project/executor:latest"
    registry_secret_name: "registry-credentials"
    cache:
      enabled: true
      repo_template: "{{ .RegistryPrefix }}/cache/{{ .Hardware }}/{{ .Stage }}"

# =============================================================================
# 十二、监控与可观测性 (Observability)
# =============================================================================
observability:
  
  metrics:
    - name: "build_duration_seconds"
      type: "histogram"
      labels: ["hardware_vendor", "app_name", "stage"]
    
    - name: "build_success_total"
      type: "counter"
      labels: ["hardware_vendor", "app_name", "result"]
    
    - name: "image_size_bytes"
      type: "gauge"
      labels: ["hardware_vendor", "app_name", "tag"]
  
  logging:
    level: "info"
    format: "json"
    output: "stdout"
    retention: "30d"
  
  tracing:
    enabled: true
    exporter: "jaeger"
    endpoint: "http://jaeger-collector:14268/api/traces"
